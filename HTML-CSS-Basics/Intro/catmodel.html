<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Cat-Model-Practice</title>
   <link rel="stylesheet" href="catmodel.css">
   <link rel="stylesheet" href="youtube.css">
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet">
</head>

<body>
   <div class="cat-model-grid">
      <div class="cat-profile">
         <div class="image-div">
            <img class="image-one" src="./images/cat1.jpg">
         </div>
         <div class="text-div">
            <div class="upper-text">
               <!-- <p class="name-text">Oliver</p> -->
               Oliver
            </div>
            <div class="mid-text">
               <div class="thumbnail-image-div">
                  <img class="image-2" src="./images/cat4.jpg">
               </div>
               <div class="friend-count-div">
                  <p class="mutual-friends">2 mutual friends</p>
               </div>
            </div>
            <div class="lower-text">
               <button class="add-friend-button">Add Friends</button>
            </div>
         </div>
      </div>
      <div class="cat-profile">
         <div class="image-div">
            <img class="image-one" src="./images/cat2.jpg">
         </div>
         <div class="text-div">
            <div class="upper-text">
               <!-- <p class="name-text">Oliver</p> -->
               Mimi
            </div>
            <div class="mid-text">
               <div class="thumbnail-image-div">
                  <img class="image-2" src="./images/cat4.jpg">
               </div>
               <div class="friend-count-div">
                  <p class="mutual-friends">3 mutual friends</p>
               </div>
            </div>
            <div class="lower-text">
               <button class="add-friend-button">Add Friends</button>
            </div>
         </div>
      </div>
      <div class="cat-profile">
         <div class="image-div">
            <img class="image-one" src="./images/cat3.jpg">
         </div>
         <div class="text-div">
            <div class="upper-text">
               <!-- <p class="name-text">Oliver</p> -->
               Rex
            </div>
            <div class="mid-text">
               <div class="thumbnail-image-div">
                  <img class="image-2" src="./images/cat4.jpg">
               </div>
               <div class="friend-count-div">
                  <p class="mutual-friends">4 mutual friends</p>
               </div>
            </div>
            <div class="lower-text">
               <button class="add-friend-button">Add Friends</button>
            </div>
         </div>
      </div>
   </div>

</body>

</html>
