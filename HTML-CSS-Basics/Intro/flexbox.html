<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Flexbox-practice</title>
</head>

<body style="padding-bottom: 500px;">
   <div style="display: flex; flex-direction: row; margin-bottom: 30px;">
      <div style="background-color: lightblue;">
         div 1 how
      </div>
      <div style="background-color: lightpink;">
         div 2
         <p>text</p>
      </div>
   </div>

   <div style="display: flex; flex-direction: row; margin-bottom: 30px;">
      <div style="background-color: lightblue; width: 100px;">
         div 1
      </div>
      <div style="background-color: lightpink; flex:1 ;"> <!--flex:1 is same as width: 1fr-->
         div 2
      </div>
   </div>

   <div style="display: flex; flex-direction: row; margin-bottom: 30px;">
      <div style="background-color: lightblue; width: 100px;">
         div 1
      </div>
      <div style="background-color: lightpink; flex:1 ;"> <!--flex:1 is same as width: 1fr-->
         div 2
      </div>
      <div style="background-color: lightblue; flex:2;">
         div 1
      </div>
   </div>

   <div style="display: flex; flex-direction: row; margin-bottom: 30px;
               height: 70px;
               border-width: 1px;
               border-style: solid;
               border-color: gray;
               justify-content: center; /* mainly for flexbox and would determine how are elements would be aligned wrt to the parent (here a div (a block element here))*/
               ">
      <div style="background-color: lightblue; width: 100px;">
         100px
      </div>
      <div style="background-color: lightpink; width: 100px; ;"> <!--flex:1 is same as width: 1fr-->
         100px
      </div>
      <div style="background-color: lightblue; width: 100px;;">
         100px
      </div>
   </div>

   <div style="display: flex; flex-direction: row; margin-bottom: 30px;
               height: 70px;
               border-width: 1px;
               border-style: solid;
               border-color: gray;
               justify-content: space-between; /* mainly for flexbox and would determine how are elements would be aligned wrt to the parent (here a div (a block element here))*/
               ">
      <div style="background-color: lightblue; width: 100px;">
         100px
      </div>
      <div style="background-color: lightpink; width: 100px; ;"> <!--flex:1 is same as width: 1fr-->
         100px
      </div>
      <div style="background-color: lightblue; width: 100px;;">
         100px
      </div>
   </div>

   <div style="display: flex; flex-direction: row; margin-bottom: 30px;
               height: 70px;
               border-width: 1px;
               border-style: solid;
               border-color: gray;
               align-items: center; /*really useful to vertically center things*/
               justify-content: space-between; /* mainly for flexbox and would determine how are elements would be aligned wrt to the parent (here a div (a block element here))*/
               ">
      <div style="background-color: lightblue; width: 100px;">
         100px
      </div>
      <div style="background-color: lightpink; width: 100px; ;"> <!--flex:1 is same as width: 1fr-->
         100px
      </div>
      <div style="background-color: lightblue; width: 100px;;">
         100px
      </div>
   </div>
</body>

</html>
