<style>
   .number{
      background-color: white;
      border: none;
      border-color: purple;
      color: purple;
      text-decoration: underline;
      font-size: large;
   }
   .stretch{
      background-color: rgb(1, 117, 1);
      border: none;
      cursor: pointer;
      color: white;
      margin-top: 20px;
      padding-left: 15px;
      padding-right: 15px;
      padding-top: 8px;
      padding-bottom: 8px;
      font-size: 18px;
      transition: transform 0.3s ease;
      transform-origin: top left;
   }
   .stretch:hover{
      transform: scale(1.3);
   }
</style>

<button>Back</button>
<button class="number">1</button>
<button class="number">2</button>
<button class="number">3</button>
<button class="number">4</button>
<button class="number">5</button>
<button>Next</button>
<br>
<button class="stretch">Stretch</button>
